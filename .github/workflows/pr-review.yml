name: AI PR Review
# Generated from Workforce PR Review Gate Adoption Registry.
# review_profile: claude-sonnet

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  review:
    uses: Bad-Robots/Workforce/.github/workflows/pr-review.yml@54d417d2003da3c03af0a600e2c5e66c3e6b6323
    permissions:
      pull-requests: write
      contents: read
    with:
      pr_number: ${{ github.event.pull_request.number }}
      pr_title: ${{ github.event.pull_request.title }}
      pr_body: ${{ github.event.pull_request.body || '' }}
      pr_author: ${{ github.event.pull_request.user.login }}
      base_ref: ${{ github.event.pull_request.base.ref }}
      repo_context: ''
      coding_rules: ''
      focus_file_patterns: ''
      workforce_runtime_ref: main
      workforce_runtime_sha: 54d417d2003da3c03af0a600e2c5e66c3e6b6323
      is_reusable_call: true
      is_fork_pr: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
      secret_scope_repos: Bad-Robots/BrowserHarness
    secrets:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      BYPASS_API_KEY: ${{ secrets.BYPASS_API_KEY }}
      WORKFORCE_RUNTIME_TOKEN: ${{ secrets.WORKFORCE_RUNTIME_TOKEN }}
