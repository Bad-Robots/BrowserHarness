name: AI PR Review
# Gen-2: cut over to the Critique service (ADR-0008). Replaces the CLIBridge
# reusable pr-review.yml. Critique builds the ReviewRequest from the PR diff
# inline, resolves reviewer routes server-side, and the gate fails closed on a
# blocked verdict (8.0 overall pass floor, per-dimension floor 6). Auth is the
# bypass gateway API key only.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  review:
    if: github.event_name != 'pull_request' && github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository
    uses: Bad-Robots/Workforce/.github/workflows/pr-review-critique.yml@efaa9c0df5f42605dd260a37a195b9521038a7fc
    permissions:
      pull-requests: write
      contents: read
    with:
      runner_labels: '["self-hosted","linux","ARM64","badrobots-aipr"]'
      pr_number: ${{ github.event.pull_request.number }}
    secrets:
      BYPASS_API_KEY: ${{ secrets.BYPASS_API_KEY }}
