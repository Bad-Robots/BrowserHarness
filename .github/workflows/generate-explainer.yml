name: Generate Architecture Explainer
on:
  push:
    branches: [main, staging]
  workflow_dispatch:
jobs:
  generate:
    uses: Bad-Robots/Workforce/.github/workflows/generate-explainer-reusable.yml@eb31a8fcf54ec74e351554a1ada7655bfaca6f3f
    with:
      caller_repo: ${{ github.repository }}
      base_branch: main
      workforce_ref: eb31a8fcf54ec74e351554a1ada7655bfaca6f3f
      runner_labels: '["self-hosted","linux","ARM64","badrobots-build"]'
    secrets:
      WORKFORCE_RUNTIME_TOKEN: ${{ secrets.WORKFORCE_RUNTIME_TOKEN }}
