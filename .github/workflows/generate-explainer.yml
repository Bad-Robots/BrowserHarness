    branches: [main, staging]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    uses: Bad-Robots/Workforce/.github/workflows/generate-explainer-reusable.yml@d3367ad4b11b17ec8fc4f2c22861d40864d84c36
    with:
      caller_repo: ${{ github.repository }}
      base_branch: main
