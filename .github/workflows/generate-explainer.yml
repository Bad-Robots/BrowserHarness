    branches: [main, staging]
  workflow_dispatch:
jobs:
  generate:
    uses: Bad-Robots/Workforce/.github/workflows/generate-explainer-reusable.yml@e6632873cba6c2368a2295076a352c37feffc38f
    with:
      caller_repo: ${{ github.repository }}
