name: Generate Architecture Explainer
on:
  push:
    branches: [main, staging]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    uses: Bad-Robots/Workforce/.github/workflows/generate-explainer-reusable.yml@0b89ea8b3259edd31795e36e035bf00282d27a8f
    with:
      caller_repo: ${{ github.repository }}
      base_branch: main
      workforce_ref: 0b89ea8b3259edd31795e36e035bf00282d27a8f
      skip_gate: true
    secrets:
      BYPASS_API_KEY: ${{ secrets.BYPASS_API_KEY }}
